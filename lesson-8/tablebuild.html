<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 8 Table Build</title>
    <!-- link styles -->
    <link rel="stylesheet" href="styles/tablecss.css" />
  </head>
  <body>
    <table>
      <tr>
        <th colspan="2">Sales</th>
      </tr>
      <tr>
        <td>Month</td>
        <td>Amount</td>
      </tr>
      <tr>
        <td>July</td>
        <td>3,000</td>
      </tr>
      <tr>
        <td>August</td>
        <td class="dark">8,000</td>
      </tr>
      <tr>
        <td>September</td>
        <td>4,000</td>
      </tr>
      <tr>
        <td>October</td>
        <td>3,000</td>
      </tr>
      <tr>
        <td>November</td>
        <td>2,000</td>
      </tr>
    </table>
  </body>
</html>
