<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="This website is the Tri-Cities Chamber of Commerce meant to unite people with promptions of outoor activities."
    />
    <title>Pasco Washington Chamber of Commerce | Join</title>
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
      integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Styles -->
    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="stylesheet" href="styles/medium.css" />
    <link rel="stylesheet" href="styles/large.css" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata&family=Montserrat&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="header--container">
        <div class="header__top">
          <img
            src="images/logo_large.webp"
            alt="Tri-Cities Chamber of Commerce Logo "
            class="header__logo"
          />
          <p class="header__title">
            <span class="header__big">Pasco Washington</span>
            Chamber of Commerce
          </p>
          <div class="header__icons__container">
            <a href="#" class="header__links"
              ><i class="fa-brands fa-facebook fa-2x"></i
            ></a>
            <a href="#" class="header__links"
              ><i class="fa-brands fa-linkedin fa-2x"></i
            ></a>
          </div>
          <a href="javascript:void(0);" class="icon" onclick="hamburger()">
            <i class="fa fa-bars"></i>
          </a>
        </div>
        <div class="header__bottom">
          <p class="header__date">
            <span class="weekday"></span>, <span class="day"></span>
            <span class="month"></span> <span class="year"></span>
          </p>
        </div>

        <div class="open" id="header__lists__container">
          <a href="discover.html" class="header__lists">Discover</a>
          <a href="#directory" class="header__lists">Directory</a>
          <a href="#join" class="header__lists">Join</a>
          <a href="#contact" class="header__lists">Contact</a>
        </div>
      </div>
    </header>

    <main>
      <form action="/thankyou.html" method="get">
        <label for="fname">First Name:</label>
        <input type="text" name="fname" id="fname" required />
        <label for="lname">Last Name:</label>
        <input type="text" name="lname" id="lname" required />
        <label for="email">Email:</label>
        <input
          type="email"
          name="email"
          id="email"
          required
          placeholder="john_doe@example.com"
        />

        <label for="tel">Phone:</label>
        <input type="tel" name="tel" id="tel" />
        <label for="buisness">Buisness Name:</label>
        <input type="text" name="buisness" id="buisness" />

        <p>Membership Level</p>
        <input type="radio" id="np" name="membershipLevel" />
        <label for="np"
          >NP Membership is for non profit organizations and there is no
          fee</label
        >
        <input type="radio" id="bm" name="membershipLevel" />
        <label for="bm">Bronze Membership</label>
        <input type="radio" id="sm" name="membershipLevel" />
        <label for="sm">Silver Membership</label>
        <input type="radio" id="gm" name="membershipLevel" />
        <label for="gm">Gold Membership</label>
      </form>
    </main>

    <footer>
      <div class="footer--container">
        <div class="footer__top">
          <img
            src="images/logo_large.webp"
            alt="Website Logo"
            class="footer__logo"
          />
          <div class="footer__left__container">
            <h1 class="footer__title">Pasco Chamber of Commerce</h1>
            <p class="footer__address"><em>Pasco, Washington</em></p>
          </div>

          <div class="footer__right__container">
            <p class="footer__email">pascochamber@pascowa.org</p>
            <p class="footer__phone">+(509) 000 0000</p>
            <p class="footer__location">📍 Location Map</p>
          </div>
        </div>
        <hr />
        <div class="footer__bottom">
          <p class="footer__copyright">©2022 Pasco Chamber</p>
          <p class="footer__name"><b>Abraham Jimenez</b></p>
          <p class="footer__project">WDD 230 Project</p>
          <p class="footer__mod">
            Last Modified: <span class="footer__modification"></span>
          </p>
        </div>
      </div>
    </footer>
    <!-- Scripts -->
    <script src="scripts/script.js"></script>
    <script src="scripts/windchill.js"></script>
  </body>
</html>
