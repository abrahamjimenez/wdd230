      <div class="header--container">
        <div class="header__top">
          <img

          />
          <p class="header__title">
            <span class="header__big">Pasco Washington</span>

          </p>
          <div class="header__icons__container">
            <a href="#" class="header__links"

            ></a>
          </div>
          <a href="javascript:void(0);" class="icon" onclick="hamburger()">
            <i class="fa fa-bars"></i>
          </a>
        </div>
        <div class="header__bottom">
          <p class="header__date">
            <span class="weekday"></span>, <span class="day"></span>
            <span class="month"></span> <span class="year"></span>

        </div>

        <div class="open" id="header__lists__container">

          <a href="#directory" class="header__lists">Directory</a>
          <a href="#join" class="header__lists">Join</a>
          <a href="#contact" class="header__lists">Contact</a>
        </div>
      </div>
    </header>
